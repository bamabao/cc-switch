# ============================================================
# 爸妈宝 — GitHub Actions CI/CD
# ============================================================
# 每次 push 到 main/master/develop 自动运行：
#   - Python 后端：lint（ruff）+ tests（pytest）
#   - Flutter 前端：analyze + test
#   - APK 打包（仅 main/master tag 触发）
#   - Docker 镜像构建验证
# ============================================================

name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  # ─── 后端测试 ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: sqlite:///./test_ci.db

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ─── Flutter 前端 ──────────────────────────────────────
  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        continue-on-error: true
        run: flutter analyze

      - name: Flutter test
        run: flutter test --machine --coverage 2>&1 || flutter test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/

  # ─── APK 打包（仅 tag 或 main/master push）────────────
  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check AAR files & NDK
        run: |
          echo "=== AAR files ==="
          ls -la android/app/libs/ 2>/dev/null || echo "NO LIBS DIR"
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "NO NDK"
          echo "=== Java ==="
          java -version 2>&1
          echo "=== Gradle wrapper ==="
          cat android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1 | tee build_output.log; exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "=== BUILD FAILED, LAST 100 LINES ==="
            tail -100 build_output.log
          fi
          exit $exit_code

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          mkdir -p ../build/apk-artifacts
          cp build/app/outputs/flutter-apk/app-debug.apk ../build/apk-artifacts/爸妈宝_v${VERSION}-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bamabao-apk-debug
          path: build/apk-artifacts/*.apk

  # ─── Docker 镜像构建 ──────────────────────────────────
  docker:
    name: Docker Build
    needs: backend-test
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: bamabao-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
