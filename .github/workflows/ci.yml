# 爸妈宝 CI
name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -v --tb=short
        env: { DATABASE_URL: sqlite:///./test_ci.db }

  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get
      - run: flutter test 2>&1 || flutter test

  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get

      # Create local.properties early so settings.gradle.kts can find Flutter SDK
      - name: Generate local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> android/local.properties
          echo "### local.properties created ###"
          cat android/local.properties

      - name: Install Android platform & NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "platforms;android-35" 2>&1 || true
          echo "y" | "$SDKMANAGER" "ndk;27.0.12077973" 2>&1 || true
          ls "$ANDROID_HOME/ndk/" 2>/dev/null
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build APK (debug)
        run: |
          flutter build apk --debug 2>&1
          ls -la build/app/outputs/flutter-apk/

      - name: Upload build log (always)
        if: failure()
        run: |
          find . -name "*.log" -path "*/android/*" 2>/dev/null | head -3
          ls ~/.gradle/daemon/ 2>/dev/null || true
          tail -100 android/.gradle/build.log 2>/dev/null || echo "No gradle build.log"

      - name: Upload APK
        if: success()
        run: |
          mkdir -p build-apk
          cp build/app/outputs/flutter-apk/app-debug.apk build-apk/
      - uses: actions/upload-artifact@v4
        if: success()
        with: { name: bamabao-apk-debug, path: app/build-apk/*.apk }
