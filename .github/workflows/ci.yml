# ============================================================
# 爸妈宝 — GitHub Actions CI/CD
# ============================================================
# 每次 push 到 main/master/develop 自动运行：
#   - Python 后端：lint（ruff）+ tests（pytest）
#   - Flutter 前端：analyze + test
#   - APK 打包（仅 main/master tag 触发）
#   - Docker 镜像构建验证
# ============================================================

name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  # ─── 后端测试 ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: sqlite:///./test_ci.db

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ─── Flutter 前端 ──────────────────────────────────────
  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        continue-on-error: true
        run: flutter analyze

      - name: Flutter test
        run: flutter test --machine --coverage 2>&1 || flutter test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/

  # ─── APK 打包（仅 tag 或 main/master push）────────────
  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Android NDK & Platform
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          [ ! -f "$sdkmanager" ] && sdkmanager="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $sdkmanager "ndk;27.0.12077973" 2>&1
          yes | $sdkmanager "platforms;android-35" 2>&1
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Android SDK list
        run: |
          echo "=== platforms ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "NO PLATFORMS"
          echo "=== build-tools ==="
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "NO BUILD-TOOLS"
          echo "=== ndk ==="
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "NO NDK"

      - name: Build APK (debug)
        shell: bash
        run: |
          flutter build apk --debug 2>&1 | tee ../build_output.log; exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "❌ Build failed with exit code $exit_code"
            tail -30 ../build_output.log
            exit $exit_code
          fi
          echo "✅ APK built successfully"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || ls -la build/app/outputs/ 2>/dev/null || echo "Checking alternate output paths..."
          find build -name "*.apk" 2>/dev/null || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-logs
          path: build_output.log
          if-no-files-found: warn

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          mkdir -p ../build/apk-artifacts
          APK_PATH=$(find build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found! Listing build dir:"
            ls -la build/ 2>/dev/null || echo "no build dir"
            ls -la build/app/outputs/ 2>/dev/null || echo "no outputs dir"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" "../build/apk-artifacts/爸妈宝_v${VERSION}-${{ github.sha }}.apk"
          echo "APK renamed successfully"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bamabao-apk-debug
          path: build/apk-artifacts/*.apk

  # ─── Docker 镜像构建 ──────────────────────────────────
  docker:
    name: Docker Build
    needs: backend-test
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: bamabao-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
