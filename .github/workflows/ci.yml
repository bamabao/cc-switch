# 爸妈宝 CI
name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -v --tb=short
        env: { DATABASE_URL: sqlite:///./test_ci.db }

  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get
      - name: flutter analyze
        continue-on-error: true
        run: flutter analyze
      - name: flutter test
        run: flutter test

  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get

      # Ensure gradlew is executable (Windows git may have lost +x)
      - name: Fix permissions
        run: chmod +x android/gradlew

      - name: Install Android platform & NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" "platforms;android-35"
          yes | "$SDKMANAGER" "ndk;27.0.12077973"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build APK (debug) with full log
        id: build
        run: |
          flutter build apk --debug 2>&1 | tee /tmp/build-out.log
          exit_code="${PIPESTATUS[0]}"
          echo "exit_code=${exit_code}" >> $GITHUB_OUTPUT
          exit ${exit_code}

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build-out.log

      - name: Upload APK
        if: success()
        run: |
          mkdir -p build-apk
          cp build/app/outputs/flutter-apk/app-debug.apk build-apk/
      - uses: actions/upload-artifact@v4
        if: success()
        with: { name: bamabao-apk-debug, path: app/build-apk/*.apk }
