# 爸妈宝 CI - 诊断版 (CI #31)
name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -v --tb=short
        env: { DATABASE_URL: sqlite:///./test_ci.db }

  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get
      - run: flutter test 2>&1 || flutter test

  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get

      - name: Install Android platform & NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "platforms;android-35" 2>&1 || true
          echo "y" | "$SDKMANAGER" "ndk;27.0.12077973" 2>&1 || true
          ls "$ANDROID_HOME/ndk/" 2>/dev/null
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Flutter doctor
        run: |
          flutter doctor -v
          echo "=== Android SDK ==="
          ls "$ANDROID_HOME/platforms/" 2>/dev/null
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null
          echo "=== local.properties ==="
          cat android/local.properties 2>/dev/null || echo "NO LOCAL.PROPERTIES"
          echo "=== FLUTTER_ROOT ==="
          echo "${FLUTTER_ROOT:-NOT SET}"
          echo "=== Gradle wrapper ==="
          ls -la android/gradlew 2>/dev/null || echo "NO GRADLEW"
          cat android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null

      - name: flutter build apk --debug --stacktrace
        shell: bash
        run: |
          flutter build apk --debug --stacktrace 2>&1 | tee /tmp/build.log
          EXIT=$?
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "no apk output"
          if [ $EXIT -ne 0 ]; then
            echo '### ❌ BUILD FAILED (tail 80 lines)' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      - name: Upload APK
        run: |
          mkdir -p build-apk
          cp build/app/outputs/flutter-apk/app-debug.apk build-apk/
      - uses: actions/upload-artifact@v4
        with: { name: bamabao-apk-debug, path: app/build-apk/*.apk }
