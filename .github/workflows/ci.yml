# 爸妈宝 CI
name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.console=plain"

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -v --tb=short
        env: { DATABASE_URL: sqlite:///./test_ci.db }

  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get
      - run: flutter test 2>&1 || flutter test

  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ./app } }
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.x", channel: "stable", cache: true }
      - run: flutter pub get

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> android/local.properties

      - name: Install Android platform & NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "platforms;android-35" 2>&1 || true
          echo "y" | "$SDKMANAGER" "ndk;27.0.12077973" 2>&1 || true
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Build APK (debug)
        id: build
        shell: bash
        run: |
          # Redirect ALL output to file, capture exit code
          flutter build apk --debug > /tmp/build-out.log 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "### Exit code: $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/build-out.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $EXIT_CODE -ne 0 ]; then
            # Extract error lines as annotations (publicly readable)
            grep -i -E '(error|FAILURE|failed|BUILD FAILED|Exception|Caused by|Error while)' /tmp/build-out.log | head -30 | while read line; do
              echo "::error file=ci.yml,title=Build Error::$line"
            done
          fi
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || true
          exit $EXIT_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build-out.log

      - name: Upload APK
        if: steps.build.outputs.exit_code == '0'
        run: |
          mkdir -p build-apk
          cp build/app/outputs/flutter-apk/app-debug.apk build-apk/
      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.exit_code == '0'
        with: { name: bamabao-apk-debug, path: app/build-apk/*.apk }
