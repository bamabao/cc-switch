# ============================================================
# 爸妈宝 — GitHub Actions CI/CD
# ============================================================
name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - run: pip install -r requirements.txt ruff pytest
      - run: ruff check .
      - run: pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: sqlite:///./test_ci.db
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true
      - run: flutter pub get
      - continue-on-error: true
        run: flutter analyze
      - run: flutter test --machine --coverage 2>&1 || flutter test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/

  build-apk:
    name: Build APK
    needs: [backend-test, flutter-analyze]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true
      - run: flutter pub get

      - name: Install NDK 27.0.12077973 & platform
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "y" | "$SDKMANAGER" --install "ndk;27.0.12077973" "platforms;android-35" 2>&1 || true
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: flutter build apk --debug
        shell: bash
        run: |
          flutter build apk --debug 2>&1 | tee /tmp/build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "BUILD_EXIT=$BUILD_EXIT"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "NO APK OUTPUT DIR"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== BUILD FAILED (last 60 lines) ==="
            tail -60 /tmp/build_output.log
            exit $BUILD_EXIT
          fi

      - name: Upload APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d+ -f1)
          mkdir -p build-artifacts
          cp build/app/outputs/flutter-apk/app-debug.apk "build-artifacts/bamabao_v${VERSION}-${GITHUB_SHA::7}.apk"
          echo "APK=bamabao_v${VERSION}-${GITHUB_SHA::7}.apk" >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bamabao-apk-debug
          path: build-artifacts/*.apk

  docker:
    name: Docker Build
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: bamabao-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
