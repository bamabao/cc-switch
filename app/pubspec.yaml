name: bamabao
description: 爸妈宝 - 老人用药管理APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  http_parser: ^4.0.0
  image_picker: ^1.0.0
  camera: ^0.11.0
  image: ^4.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  connectivity_plus: ^6.0.0
  permission_handler: ^11.3.0
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.0.0
  sqflite: ^2.3.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_intl:
  enabled: false
