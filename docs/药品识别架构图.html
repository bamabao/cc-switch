<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>爸妈宝 药品识别系统架构图</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font:
      14px/1.4 ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
  }
  main {
    max-width: 1024px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .edge-thick { stroke: var(--line); stroke-width: 2; fill: none; }
  .edge-green { stroke: #22c55e; stroke-width: 1.5; fill: none; }
  .edge-red { stroke: #ef4444; stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; rx: 8; ry: 8; }
  .highlight { fill: #bbf7d0; stroke: #22c55e; stroke-width: 1.5; rx: 6; ry: 6; }
</style>
<main>
  <svg viewBox="0 0 940 620" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 Z" fill="var(--line)"/>
      </marker>
      <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/>
      </marker>
      <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
      </marker>
    </defs>

    <!-- Title -->
    <text x="470" y="30" text-anchor="middle" class="title">爸妈宝 药品识别系统架构图</text>
    <text x="470" y="50" text-anchor="middle" class="small">本地OCR + 火山视觉AI 混合识别 + 药品数据库缓存</text>

    <!-- Zone: Backend -->
    <rect x="230" y="70" width="500" height="530" class="zone"/>
    <text x="245" y="92" class="label" font-size="13">FastAPI 后端</text>

    <!-- User / Input -->
    <rect x="370" y="82" width="220" height="46" class="input node"/>
    <text x="480" y="103" text-anchor="middle" class="label" font-size="13">📱 用户拍照上传</text>
    <text x="480" y="118" text-anchor="middle" class="small">POST /api/medicine/recognize</text>

    <!-- Arrow: user to hasher -->
    <path d="M480,128 L480,155" class="edge" marker-end="url(#arrow)"/>

    <!-- Image Hash -->
    <rect x="370" y="155" width="220" height="36" class="process node"/>
    <text x="480" y="177" text-anchor="middle" class="label" font-size="12">计算图片 SHA256 哈希</text>

    <!-- Arrow: hasher to cache check -->
    <path d="M590,173 L640,173" class="edge" marker-end="url(#arrow)"/>

    <!-- Cache Check -->
    <rect x="640" y="155" width="170" height="36" class="storage node"/>
    <text x="725" y="177" text-anchor="middle" class="label" font-size="12">查 medicine_cache</text>

    <!-- Cache hit → return (green arrow) -->
    <path d="M810,173 L860,173 L860,82 L590,82 L590,105" class="edge-green" marker-end="url(#arrow-green)"/>
    <text x="835" y="130" text-anchor="middle" class="small" fill="#22c55e">缓存命中 → 直接返回</text>

    <!-- Cache miss → local OCR (red arrow) -->
    <path d="M725,191 L725,220 L480,220 L480,245" class="edge-red" marker-end="url(#arrow-red)"/>

    <!-- Decision: Cache Miss label -->
    <text x="610" y="210" text-anchor="middle" class="small" fill="#ef4444">未命中</text>

    <!-- Local OCR -->
    <rect x="330" y="245" width="300" height="46" class="highlight"/>
    <text x="480" y="266" text-anchor="middle" class="label" font-size="13">🆓 本地OCR引擎（免费）</text>
    <text x="480" y="281" text-anchor="middle" class="small">Tesseract / PaddleOCR</text>

    <!-- Arrow: local OCR to confidence check -->
    <path d="M480,291 L480,318" class="edge" marker-end="url(#arrow)"/>

    <!-- Confidence check -->
    <polygon points="480,325 560,355 480,385 400,355" class="process node"/>
    <text x="480" y="352" text-anchor="middle" class="label" font-size="11">置信度</text>
    <text x="480" y="365" text-anchor="middle" class="label" font-size="11">≥ 阈值？</text>

    <!-- High confidence → write cache + return (green) -->
    <path d="M560,355 L640,355 L640,280 L700,280" class="edge-green" marker-end="url(#arrow-green)"/>
    <text x="620" y="340" text-anchor="middle" class="small" fill="#22c55e">是（≥阈值）</text>

    <!-- Write to cache (high conf) -->
    <rect x="700" y="260" width="170" height="36" class="storage node"/>
    <text x="785" y="282" text-anchor="middle" class="label" font-size="12">写入缓存库</text>

    <!-- Return from high conf -->
    <path d="M785,260 L785,82 L590,82 L590,105" class="edge-green" marker-end="url(#arrow-green)"/>
    <text x="690" y="130" text-anchor="middle" class="small" fill="#22c55e">返回结果</text>

    <!-- Low confidence → Volcano API (red) -->
    <path d="M400,355 L180,355 L180,450" class="edge-red" marker-end="url(#arrow-red)"/>
    <text x="280" y="340" text-anchor="middle" class="small" fill="#ef4444">否（< 阈值）</text>

    <!-- Volcano API -->
    <rect x="50" y="450" width="260" height="46" class="external node"/>
    <text x="180" y="471" text-anchor="middle" class="label" font-size="13">🌋 火山视觉API（兜底）</text>
    <text x="180" y="486" text-anchor="middle" class="small">单次 ~¥0.3</text>

    <!-- Arrow: volcano back to cache write -->
    <path d="M310,473 L480,473 L480,510" class="edge" marker-end="url(#arrow)"/>

    <!-- Write cache (volcano result) -->
    <rect x="380" y="510" width="200" height="36" class="storage node"/>
    <text x="480" y="532" text-anchor="middle" class="label" font-size="12">结果写入缓存库</text>

    <!-- Arrow: cache write back to return -->
    <path d="M480,546 L480,570 L785,570 L785,296" class="edge" marker-end="url(#arrow)"/>

    <!-- Legend -->
    <rect x="50" y="580" width="820" height="30" class="neutral node" rx="6"/>
    <rect x="65" y="588" width="14" height="14" class="highlight"/>
    <text x="84" y="599" class="small">免费通道</text>
    <rect x="170" y="588" width="14" height="14" class="storage"/>
    <text x="189" y="599" class="small">数据库缓存</text>
    <rect x="300" y="588" width="14" height="14" class="external"/>
    <text x="319" y="599" class="small">第三方API（付费）</text>
    <line x1="440" y1="595" x2="470" y2="595" stroke="#22c55e" stroke-width="2"/>
    <text x="476" y="599" class="small" fill="#22c55e">成功路径</text>
    <line x1="570" y1="595" x2="600" y2="595" stroke="#ef4444" stroke-width="2"/>
    <text x="606" y="599" class="small" fill="#ef4444">降级/失败路径</text>
  </svg>
</main>
</html>
