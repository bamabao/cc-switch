# ============================================================
# 爸妈宝 — Docker Compose 开发/生产环境
# ============================================================
# 使用方式：
#   开发模式（热重载）：  docker compose up -d
#   查看日志：           docker compose logs -f backend
#   执行测试：           docker compose exec backend pytest -v
#   停止：               docker compose down
#   重建：               docker compose build --no-cache
# ============================================================

version: "3.9"

services:
  # ---- 后端 FastAPI 服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bamabao-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 开发模式：挂载源码实现热重载
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./bamabao.db
      - DEBUG=true
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- MySQL 数据库（生产环境） ----
