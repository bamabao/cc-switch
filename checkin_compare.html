<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>v3.4卡片对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#eef6e8;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.block{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;}
.panel{background:#f2f7f0;border-radius:20px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.08);width:440px;}
.panel h3{font-size:26px;color:#e53935;margin-bottom:16px;border-bottom:2px dashed #ddd;padding-bottom:8px;}

/* 旧版卡片-单按钮 */
.card-old{
  background:white;border-radius:20px;padding:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
}
.btn-old{width:72px;height:72px;border-radius:50%;background:red;flex-shrink:0;}

/* 新版卡片-标题行+多时段 */
.card-new{
  background:white;border-radius:20px;padding:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);margin-bottom:12px;
}
.hdr{display:flex;align-items:center;gap:12px;}
.btn-hdr{width:72px;height:72px;border-radius:50%;background:#ddd;flex-shrink:0;opacity:.5;}
.info{flex:1;}
.name{font-size:24px;font-weight:700;color:#333;}
.dose{font-size:18px;color:#888;margin-top:4px;}
.arrow{font-size:30px;color:#888;}
.divider{height:1px;background:#eee;margin:10px 0 10px 92px;}
.row{display:flex;align-items:center;gap:12px;padding:4px 0;}
.btn-row{width:72px;height:72px;border-radius:50%;flex-shrink:0;}
.time{font-size:24px;font-weight:600;color:#333;}
.red{background:#F87670;}
.green{background:#59C992;display:flex;align-items:center;justify-content:center;color:white;font-size:30px;}
.grey{background:#ddd;}
</style>
</head>
<body>
<h2 style="font-size:28px;color:#3A4437;">左：v3.3旧版（单按钮） vs 右：v3.4新版（多时段行）</h2>

<div class="block">
<div class="panel">
<h3>❌ v3.3 旧版 — 一药一按钮</h3>
<div class="card-old"><div class="btn-old"></div><div class="info"><div class="name">阿莫西林胶囊</div><div class="dose">1粒 · 08:00</div></div><div class="arrow">›</div></div>
<div class="card-old"><div class="btn-old"></div><div class="info"><div class="name">维生素C片</div><div class="dose">1片 · 21:00</div></div><div class="arrow">›</div></div>
</div>

<div class="panel">
<h3>✅ v3.4 新版 — 标题行+独立时段行</h3>

<!-- 双时段药品 -->
<div class="card-new">
<div class="hdr"><div class="btn-hdr"></div><div class="info"><div class="name">阿莫西林胶囊</div><div class="dose">1 粒 · 08:00 / 20:00</div></div><div class="arrow">›</div></div>
<div class="divider"></div>
<div class="row"><div class="btn-row green">✓</div><span class="time">08:00</span><span style="font-size:20px;color:#888;margin-left:12px;">1 粒</span></div>
<div class="row"><div class="btn-row red"></div><span class="time">20:00</span><span style="font-size:20px;color:#888;margin-left:12px;">1 粒</span></div>
</div>

<!-- 单时段药品 -->
<div class="card-new">
<div class="hdr"><div class="btn-hdr"></div><div class="info"><div class="name">维生素C片</div><div class="dose">1 片 · 21:00</div></div><div class="arrow">›</div></div>
<div class="divider"></div>
<div class="row"><div class="btn-row red"></div><span class="time">21:00</span><span style="font-size:20px;color:#888;margin-left:12px;">1 片</span></div>
</div>
</div>
</div>

<p style="margin-top:30px;font-size:22px;color:#333;">⬆ 关键在于：每张卡片现在有<b>「标题行（仅标识）→ 分隔线 → N个独立时段行（各自可点按钮）」</b>的纵向结构。</p>
</body>
</html>
