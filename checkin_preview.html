<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爸妈宝 v3.4 — 打卡卡片预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #E6F7DD;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
/* 顶部卡片 */
.header-card {
  width: 460px;
  background: #F2F7F0;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 8px 20px rgba(58,68,55,0.08);
}
.header-card h1 { font-size: 28px; color: #3A4437; font-weight: 700; }
.header-card .subtitle { font-size: 20px; color: #E53935; margin-top: 8px; }
.header-card .extrainfo { font-size: 22px; color: #616161; margin-top: 4px; }
/* 标题行 */
.section-title {
  width: 460px;
  display: flex; align-items: baseline; gap: 12px;
}
.section-title h2 { font-size: 28px; color: #3A4437; font-weight: 700; }
.section-title span { font-size: 20px; color: #616161; }

/* 卡片 */
.card {
  width: 460px;
  background: #F2F7F0;
  border-radius: 20px;
  padding: 16px 16px 12px;
  box-shadow:
    0 8px 20px rgba(58,68,55,0.08),
    -2px -2px 4px rgba(255,255,255,0.5);
  user-select: none;
}
/* 标题行 */
.header-row {
  display: flex; align-items: center; gap: 12px;
}
.btn-wrapper { padding: 10px; flex-shrink: 0; }
.btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  position: relative; overflow: hidden; cursor: pointer;
  transition: all 0.25s ease-out;
}
.btn-red { background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), #F87670 50%, rgba(248,118,112,0.82)); }
.btn-green { background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), #59C992 50%, rgba(89,201,146,0.82)); }
.btn-check { display: flex; align-items: center; justify-content: center; }
.btn-check svg { width: 36px; height: 36px; color: white; }

.btn-header { cursor: default; opacity: 0.85; }
.btn-header:hover { transform: none !important; }

.info-area { flex: 1; min-width: 0; }
.med-name { font-size: 28px; font-weight: 700; color: #3A4437; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.med-dose { font-size: 22px; color: #616161; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.arrow { font-size: 32px; color: #616161; flex-shrink: 0; cursor: pointer; }

/* 分隔线 */
.divider { margin: 8px 0 8px 92px; height: 1px; background: rgba(224,224,224,0.6); }

/* 时段行 */
.schedule-row {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 0;
}
.schedule-time { font-size: 28px; font-weight: 600; color: #3A4437; }
.schedule-dose { font-size: 24px; color: #616161; margin-left: 16px; }
.schedule-check { display: flex; align-items: center; gap: 12px; margin-left: 12px; }
.schedule-check svg { width: 28px; height: 28px; }

/* 动画 */
@keyframes press {
  0% { transform: scale(1); }
  30% { transform: scale(0.92); }
  55% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.animating { animation: press 0.5s ease-in-out; }
</style>
</head>
<body>

<!-- 顶部状态卡片 -->
<div class="header-card">
  <h1>早上好！</h1>
  <div class="subtitle">今天有 <span id="medCount">2</span> 种药需要服用</div>
  <div class="extrainfo">今日共 <span id="medCount2">2</span> 种药品、剩余 <span id="remainCount" style="color:#F87670;font-weight:700;">3</span> 次待服用</div>
</div>

<div style="display:flex;width:460px;align-items:baseline;gap:12px;">
  <h2 style="font-size:28px;color:#3A4437;font-weight:700;">📋 今日用药</h2>
  <span style="font-size:20px;color:#616161;">共 <span id="medCount3">2</span> 种药品</span>
</div>

<!-- 卡片1：阿莫西林胶囊 — 双时段 -->
<div class="card" id="card0">
  <div class="header-row" onclick="showDetail(0)">
    <div class="btn-wrapper">
      <div class="btn btn-red" id="hdrBtn0" style="cursor:default;" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;width:36px;height:36px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)" id="hdrChk0"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="info-area">
      <div class="med-name">阿莫西林胶囊</div>
      <div class="med-dose">1 粒 · 08:00 / 20:00</div>
    </div>
    <div class="arrow">›</div>
  </div>
  <div class="divider"></div>

  <!-- 时段1：08:00 -->
  <div class="schedule-row">
    <div class="btn-wrapper">
      <div class="btn btn-green btn-check" id="sch00" onclick="toggleSlot(0,0)" style="cursor:pointer;">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <span class="schedule-time">08:00</span>
    <span class="schedule-dose">1 粒</span>
    <span class="schedule-check">
      <svg viewBox="0 0 24 24" fill="#59C992" style="width:28px;height:28px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </span>
  </div>

  <!-- 时段2：20:00 -->
  <div class="schedule-row">
    <div class="btn-wrapper">
      <div class="btn btn-red" id="sch01" onclick="toggleSlot(0,1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;width:36px;height:36px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <span class="schedule-time">20:00</span>
    <span class="schedule-dose">1 粒</span>
    <span class="schedule-check" id="sch01check"></span>
  </div>
</div>

<!-- 卡片2：维生素C片 — 单时段 -->
<div class="card" id="card1">
  <div class="header-row" onclick="showDetail(1)">
    <div class="btn-wrapper">
      <div class="btn btn-red" id="hdrBtn1" style="cursor:default;" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;width:36px;height:36px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)" id="hdrChk1"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="info-area">
      <div class="med-name">维生素C片</div>
      <div class="med-dose">1 片 · 21:00</div>
    </div>
    <div class="arrow">›</div>
  </div>
  <div class="divider"></div>
  <div class="schedule-row">
    <div class="btn-wrapper">
      <div class="btn btn-red" id="sch10" onclick="toggleSlot(1,0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;width:36px;height:36px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <span class="schedule-time">21:00</span>
    <span class="schedule-dose">1 片</span>
    <span class="schedule-check" id="sch10check"></span>
  </div>
</div>

<script>
// 数据结构
const meds = [
  { name: '阿莫西林胶囊', slots: [
    { time: '08:00', dose: '1 粒', checked: true },
    { time: '20:00', dose: '1 粒', checked: false },
  ]},
  { name: '维生素C片', slots: [
    { time: '21:00', dose: '1 片', checked: false },
  ]},
];

function updateHeader() {
  let totalPending = 0;
  let totalMeds = meds.length;
  for (const m of meds) {
    for (const s of m.slots) {
      if (!s.checked) totalPending++;
    }
  }
  document.getElementById('remainCount').textContent = totalPending;
  document.getElementById('remainCount').style.color = totalPending > 0 ? '#F87670' : '#59C992';
}

function updateHeaderBtn(medIdx) {
  const m = meds[medIdx];
  const allChecked = m.slots.every(s => s.checked);
  const btn = document.getElementById('hdrBtn' + medIdx);
  const chk = document.getElementById('hdrChk' + medIdx);
  btn.className = 'btn btn-header ' + (allChecked ? 'btn-green btn-check' : 'btn-red');
  chk.style.display = allChecked ? 'block' : 'none';
}

function toggleSlot(medIdx, slotIdx) {
  const m = meds[medIdx];
  const s = m.slots[slotIdx];
  s.checked = !s.checked;

  // 更新按钮UI
  const btnId = 'sch' + medIdx + slotIdx;
  const btn = document.getElementById(btnId);
  const checkId = 'sch' + medIdx + slotIdx + 'check';

  btn.className = 'btn ' + (s.checked ? 'btn-green btn-check' : 'btn-red');
  // 显示/隐藏勾
  const svg = btn.querySelector('svg');
  svg.style.display = s.checked ? 'block' : 'none';

  // 更新右侧check_circle
  const checkEl = document.getElementById(checkId);
  if (s.checked) {
    checkEl.innerHTML = '<svg viewBox="0 0 24 24" fill="#59C992" style="width:28px;height:28px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  } else {
    checkEl.innerHTML = '';
  }

  // 动画
  btn.classList.remove('animating');
  void btn.offsetWidth;
  btn.classList.add('animating');

  // 更新标题行按钮
  updateHeaderBtn(medIdx);
  updateHeader();
}

function showDetail(medIdx) {
  alert('跳转药品详情页：' + meds[medIdx].name);
}

// 初始状态
updateHeader();
updateHeaderBtn(0);
updateHeaderBtn(1);
</script>
</body>
</html>
